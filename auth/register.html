<!DOCTYPE html>
<html lang="en" translate="no" class="notranslate dark" style="color-scheme: dark;">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover">
  <title>Sign Up - Ocean Anti-Cheat</title>
  <meta name="description" content="Create your Ocean account and start managing screenshare scans.">
  <link rel="stylesheet" href="/_next/static/chunks/0yee9rl2ed49n.css">
  <link rel="stylesheet" href="/_next/static/chunks/0_pn-.otylr.d.css">
  <link rel="stylesheet" href="/local-overrides.css">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% -10%, rgba(59, 106, 237, .16), transparent 22rem),
        radial-gradient(circle at 14% 82%, rgba(59, 106, 237, .09), transparent 28rem),
        #090a0b;
      color: #fafafa;
      font-family: var(--font-plus-jakarta), Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .auth-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 18px;
      position: relative;
      overflow: hidden;
    }
    .auth-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
      background-size: 64px 64px;
      mask-image: radial-gradient(circle at center, black, transparent 76%);
      pointer-events: none;
    }
    .auth-panel {
      width: min(100%, 430px);
      position: relative;
      z-index: 1;
    }
    .auth-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
    }
    .auth-brand img {
      height: 34px;
      width: auto;
      filter: drop-shadow(0 0 28px rgba(59, 106, 237, .28));
    }
    .auth-card {
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(13, 14, 16, .88);
      box-shadow: 0 24px 90px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.04);
      backdrop-filter: blur(18px);
      border-radius: 12px;
      padding: 34px;
    }
    .auth-eyebrow {
      margin: 0 0 12px;
      color: rgba(250,250,250,.46);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .16em;
    }
    .auth-title {
      margin: 0;
      font-size: 32px;
      line-height: 1.08;
      letter-spacing: 0;
      font-weight: 760;
    }
    .auth-copy {
      margin: 12px 0 28px;
      color: rgba(250,250,250,.64);
      font-size: 14px;
      line-height: 1.55;
    }
    .auth-form {
      display: grid;
      gap: 16px;
    }
    .auth-field {
      display: grid;
      gap: 8px;
      color: rgba(250,250,250,.78);
      font-size: 13px;
      font-weight: 600;
    }
    .auth-field input {
      height: 44px;
      border-radius: 9px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(5,6,7,.72);
      color: #fafafa;
      padding: 0 13px;
      font: inherit;
      outline: none;
      transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
    }
    .auth-field input::placeholder { color: rgba(250,250,250,.32); }
    .auth-field input:focus {
      border-color: rgba(59,106,237,.9);
      box-shadow: 0 0 0 4px rgba(59,106,237,.16);
      background: rgba(8,9,11,.94);
    }
    .auth-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      min-height: 24px;
      color: rgba(250,250,250,.56);
      font-size: 13px;
    }
    .auth-row label {
      display: inline-flex;
      gap: 8px;
      align-items: center;
    }
    .auth-row input { accent-color: #3b6aed; }
    .auth-link {
      color: #6f93ff;
      text-decoration: none;
      font-weight: 650;
    }
    .auth-link:hover { color: #9ab1ff; }
    .auth-submit {
      height: 46px;
      border: 0;
      border-radius: 10px;
      background: #3b6aed;
      color: #fff;
      font-weight: 750;
      cursor: pointer;
      box-shadow: 0 14px 36px rgba(59,106,237,.26);
      transition: transform .18s ease, filter .18s ease;
    }
    .auth-submit:hover { filter: brightness(1.08); }
    .auth-submit:active { transform: translateY(1px); }
    .auth-note {
      margin-top: 22px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,.1);
      color: rgba(250,250,250,.58);
      text-align: center;
      font-size: 13px;
    }
    .auth-status {
      min-height: 18px;
      color: rgba(250,250,250,.54);
      font-size: 12px;
      text-align: center;
    }
    @media (max-width: 520px) {
      .auth-card { padding: 26px; }
      .auth-title { font-size: 28px; }
    }
  </style>
</head>
<body>
  <script id="local-dark-mode-lock">try{localStorage.setItem('theme','dark');document.documentElement.classList.remove('light');document.documentElement.classList.add('dark');document.documentElement.style.colorScheme='dark'}catch(e){}</script>
  <main class="auth-shell">
    <section class="auth-panel" aria-label="Create account">
      <a class="auth-brand" href="/" aria-label="Ocean home">
        <img src="/home/ocean_logosvg.svg" alt="Ocean">
      </a>
      <div class="auth-card">
        <p class="auth-eyebrow">GET STARTED</p>
        <h1 class="auth-title">Create account</h1>
        <p class="auth-copy">Create your Ocean account and start managing screenshare scans.</p>
        <form class="auth-form" data-auth-form>
          
            <label class="auth-field">
              <span>Username</span>
              <input name="username" autocomplete="username" placeholder="ocean_staff" required>
            </label>
          <label class="auth-field">
            <span>Email</span>
            <input type="email" name="email" autocomplete="email" placeholder="you@example.com" required>
          </label>
          <label class="auth-field">
            <span>Password</span>
            <input type="password" name="password" autocomplete="new-password" placeholder="••••••••" minlength="6" required>
          </label>
          <div class="auth-row">
            <label><input type="checkbox" > Accept terms</label>
            <a class="auth-link" href="/auth/login/">Login instead</a>
          </div>
          <button class="auth-submit" type="submit">Create account</button>
          <div class="auth-status" data-auth-status></div>
        </form>
        <p class="auth-note">Already have an account? <a href="/auth/login/" class="auth-link">Login</a></p>
      </div>
    </section>
  </main>
  <script>
    document.querySelector('[data-auth-form]').addEventListener('submit', function (event) {
      event.preventDefault();
      var button = event.currentTarget.querySelector('.auth-submit');
      var status = event.currentTarget.querySelector('[data-auth-status]');
      button.textContent = 'Creating account...';
      status.textContent = 'Connecting to Ocean...';
      setTimeout(function () {
        localStorage.setItem('ocean-auth-preview', 'true');
        window.location.href = '/pricing/';
      }, 650);
    });
  </script>
</body>
</html>
